<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Desempeno general de modelos de aprendizaje profundo</title>
  <desc id="desc">Resumen publico y cualitativo de modelos de aprendizaje profundo para prediccion de impacto energetico, sin valores especificos.</desc>
  <style>
    .bg{fill:#f7faf8}.card{fill:#fff;stroke:#dbe8df;stroke-width:2}.soft{fill:#f9fcfa;stroke:#dbe8df;stroke-width:2}.text{fill:#17251f}.muted{fill:#60736a}.green{fill:#00782b}.cyan{fill:#007a9f}.amber{fill:#f2b233}.support{fill:#80a022}.axis{stroke:#cbded3;stroke-width:2}.title{font:800 34px Arial,sans-serif}.label{font:800 24px Arial,sans-serif}.copy{font:600 18px Arial,sans-serif}.tiny{font:600 15px Arial,sans-serif}.chip{font:800 17px Arial,sans-serif}
  </style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="card" x="36" y="36" width="1128" height="648" rx="8"/>
  <text class="title text" x="72" y="92">Modelos DL para predicción de impacto</text>
  <text class="copy muted" x="72" y="126">Resumen público sin métricas definitivas ni nombres de arquitecturas específicas</text>

  <g transform="translate(72 168)">
    <rect class="soft" width="500" height="220" rx="8"/>
    <text class="label text" x="32" y="52">Modelo DL multimodal</text>
    <text class="tiny muted" x="32" y="82">Integra señales de red, clima y contexto ambiental</text>
    <g transform="translate(32 126)">
      <text class="chip green" x="0" y="0">Desempeño estable</text>
      <rect x="0" y="20" width="382" height="20" rx="8" fill="#e5f1ea"/>
      <rect x="0" y="20" width="310" height="20" rx="8" fill="#00782b"/>
      <text class="chip cyan" x="0" y="76">Explicabilidad por modalidad</text>
      <rect x="0" y="96" width="382" height="20" rx="8" fill="#e5f1ea"/>
      <rect x="0" y="96" width="338" height="20" rx="8" fill="#007a9f"/>
    </g>
  </g>

  <g transform="translate(628 168)">
    <rect class="soft" width="500" height="220" rx="8"/>
    <text class="label text" x="32" y="52">Modelo DL tabular</text>
    <text class="tiny muted" x="32" y="82">Referencia para contraste y validación interna</text>
    <g transform="translate(32 126)">
      <text class="chip green" x="0" y="0">Error controlado</text>
      <rect x="0" y="20" width="382" height="20" rx="8" fill="#e5f1ea"/>
      <rect x="0" y="20" width="326" height="20" rx="8" fill="#80a022"/>
      <text class="chip amber" x="0" y="76">Generalización en revisión</text>
      <rect x="0" y="96" width="382" height="20" rx="8" fill="#e5f1ea"/>
      <rect x="0" y="96" width="292" height="20" rx="8" fill="#f2b233"/>
    </g>
  </g>

  <g transform="translate(72 438)">
    <rect class="soft" width="1056" height="178" rx="8"/>
    <text class="label text" x="32" y="48">Lectura para publicación</text>
    <text class="copy muted" x="32" y="82">La página comunica el flujo y la evidencia cualitativa.</text>
    <text class="copy muted" x="32" y="112">Las métricas finales se reservan para el reporte técnico validado.</text>
    <line class="axis" x1="670" y1="92" x2="990" y2="92"/>
    <circle cx="714" cy="92" r="14" fill="#00782b"/>
    <text class="tiny text" x="738" y="98">predicción</text>
    <circle cx="836" cy="92" r="14" fill="#007a9f"/>
    <text class="tiny text" x="860" y="98">validación</text>
    <circle cx="944" cy="92" r="14" fill="#f2b233"/>
    <text class="tiny text" x="968" y="98">explicación</text>
  </g>
</svg>
