<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Captura publica del mapa CHEC</title>
  <desc id="desc">Mockup tipo captura de un mapa de criticidad con zonas agregadas y filtros publicos sin coordenadas exactas.</desc>
  <style>
    .bg{fill:#f7faf8}.card{fill:#fff;stroke:#dbe8df;stroke-width:2}.panel{fill:#f9fcfa;stroke:#dbe8df;stroke-width:2}.tile{fill:#eef5f0;stroke:#dce9e1;stroke-width:2}.text{fill:#17251f}.muted{fill:#60736a}.green{fill:#00782b}.support{fill:#80a022}.cyan{fill:#007a9f}.amber{fill:#f2b233}.road{fill:none;stroke:#ffffff;stroke-width:12;stroke-linecap:round;stroke-linejoin:round}.road2{fill:none;stroke:#c8d9cf;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.river{fill:none;stroke:#9fd4dd;stroke-width:16;stroke-linecap:round;stroke-linejoin:round;opacity:.65}.title{font:800 34px Arial,sans-serif}.label{font:800 24px Arial,sans-serif}.copy{font:600 18px Arial,sans-serif}.tiny{font:600 15px Arial,sans-serif}.chip{font:800 16px Arial,sans-serif}
  </style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="card" x="36" y="36" width="1128" height="648" rx="8"/>
  <text class="title text" x="72" y="92">Captura del mapa de criticidad</text>
  <text class="copy muted" x="72" y="126">Recorte público: zonas agregadas, filtros visibles y sin coordenadas exactas</text>

  <g transform="translate(72 168)">
    <rect class="panel" width="760" height="448" rx="8"/>
    <rect x="28" y="76" width="704" height="330" rx="8" fill="#eaf2ed"/>
    <path d="M34 330 C160 250 210 294 318 224 S520 140 722 196" fill="#dfece4"/>
    <path d="M34 176 C190 114 314 156 438 128 S614 94 722 142" fill="#f3f7f4"/>
    <path class="river" d="M70 348 C176 300 234 326 326 272 S470 222 670 250"/>
    <path class="road" d="M82 134 C210 196 298 182 396 242 S558 324 704 286"/>
    <path class="road2" d="M82 134 C210 196 298 182 396 242 S558 324 704 286"/>
    <path class="road" d="M120 386 C246 302 268 198 416 172 S590 156 690 92"/>
    <path class="road2" d="M120 386 C246 302 268 198 416 172 S590 156 690 92"/>
    <path class="road" d="M72 254 C196 240 282 266 386 218 S554 166 708 190"/>
    <path class="road2" d="M72 254 C196 240 282 266 386 218 S554 166 708 190"/>

    <circle cx="236" cy="260" r="58" fill="#f2b233" opacity=".72"/>
    <circle cx="420" cy="206" r="42" fill="#007a9f" opacity=".48"/>
    <circle cx="594" cy="292" r="54" fill="#80a022" opacity=".50"/>
    <circle cx="236" cy="260" r="14" fill="#fff" stroke="#00782b" stroke-width="4"/>
    <circle cx="420" cy="206" r="14" fill="#fff" stroke="#00782b" stroke-width="4"/>
    <circle cx="594" cy="292" r="14" fill="#fff" stroke="#00782b" stroke-width="4"/>

    <rect x="48" y="96" width="172" height="34" rx="8" fill="#fff" opacity=".92"/>
    <text class="tiny muted" x="64" y="118">Mapa anonimizado</text>
    <rect x="48" y="350" width="248" height="36" rx="8" fill="#fff" opacity=".92"/>
    <circle cx="68" cy="368" r="8" fill="#f2b233"/>
    <text class="tiny muted" x="86" y="374">concentración agregada</text>

    <text class="label text" x="28" y="48">Mapa del dashboard</text>
  </g>

  <g transform="translate(864 168)">
    <rect class="panel" width="264" height="448" rx="8"/>
    <text class="label text" x="28" y="48">Filtros</text>
    <rect class="tile" x="28" y="82" width="208" height="54" rx="8"/>
    <text class="chip green" x="48" y="115">Periodo</text>
    <rect class="tile" x="28" y="154" width="208" height="54" rx="8"/>
    <text class="chip cyan" x="48" y="187">Zona agregada</text>
    <rect class="tile" x="28" y="226" width="208" height="54" rx="8"/>
    <text class="chip amber" x="48" y="259">Criticidad</text>
    <text class="tiny muted" x="28" y="330">Salida pública</text>
    <rect x="28" y="350" width="208" height="54" rx="8" fill="#eef8f1"/>
    <text class="tiny green" x="48" y="372">Patrones espaciales</text>
    <text class="tiny green" x="48" y="392">sin datos sensibles</text>
  </g>
</svg>
